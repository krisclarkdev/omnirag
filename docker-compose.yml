services:
  # ═══════════════════════════════════════════════════════════════
  # Pod 1: project-alpha — first Knowledge Base
  # ═══════════════════════════════════════════════════════════════
  redis-alpha:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      # ⚠️ Redis persistence — change ./redis-alpha to your preferred path
      - ./redis-alpha:/data
    restart: unless-stopped

  omnirag-alpha:
    image: ghcr.io/krisclarkdev/omnirag:main
    ports:
      - "3000:3000"
    volumes:
      # ⚠️ Your documents — change ./alpha-docs to your local folder path
      - ./alpha-docs:/rag:ro
    environment:
      - REDIS_URL=redis://redis-alpha:6379/0
      - RUST_LOG=info,omnirag=debug
    depends_on:
      - redis-alpha
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════
  # Pod 2: project-beta — second Knowledge Base (optional)
  # Uncomment to run a second isolated sync for another KB.
